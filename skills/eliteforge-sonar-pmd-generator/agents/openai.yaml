interface:
  display_name: "Spec-driven Sonar PMD Generator"
  short_description: "Turn user-provided coding specifications into L1/L2/L3 classification, PMD rules, custom sonar-pmd plugin packages, and Docker-based SonarQube validation."
  default_prompt: "Use $eliteforge-sonar-pmd-generator with my specification file(s) and target language(s): auto-classify L1/L2/L3, generate PMD rules for L1/L2, package a custom sonar-pmd plugin with a quality profile, run Docker SonarQube, scan a test project with Maven Sonar plugin, and report verification evidence."
